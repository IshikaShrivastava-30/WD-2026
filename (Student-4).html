<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Academic Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f7;
        }

        table {
            width: 85%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            color: #2c3e50;
        }

        thead {
            background-color: #34495e;
            color: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tfoot {
            background-color: #dfe6e9;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }

        .pass {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <caption>Student Academic Performance Report - 2026</caption>

    <!-- Column Styling -->
    <colgroup>
        <col span="1" style="background-color:#f1f2f6">
        <col span="3">
        <col span="1" style="background-color:#f1f2f6">
    </colgroup>

    <thead>
        <tr>
            <th scope="col" rowspan="2">Subject</th>
            <th scope="col" colspan="3">Marks</th>
            <th scope="col" rowspan="2">Result</th>
        </tr>
        <tr>
            <th scope="col">Internal (30)</th>
            <th scope="col">External (70)</th>
            <th scope="col">Total (100)</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <th scope="row">Mathematics</th>
            <td>25</td>
            <td>60</td>
            <td>85</td>
            <td class="pass">Pass</td>
        </tr>

        <tr>
            <th scope="row">Physics</th>
            <td>22</td>
            <td>55</td>
            <td>77</td>
            <td class="pass">Pass</td>
        </tr>

        <tr>
            <th scope="row">Chemistry</th>
            <td>18</td>
            <td>40</td>
            <td>58</td>
            <td class="pass">Pass</td>
        </tr>

        <tr>
            <th scope="row">English</th>
            <td>20</td>
            <td>30</td>
            <td>50</td>
            <td class="pass">Pass</td>
        </tr>

        <tr>
            <th scope="row">Computer Science</th>
            <td>28</td>
            <td>65</td>
            <td>93</td>
            <td class="pass">Pass</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="3">Grand Total</td>
            <td>363 / 500</td>
            <td>Overall: First Class</td>
        </tr>
    </tfoot>

</table>

</body>
</html>
