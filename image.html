<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Gallery</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Background Gradient */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            padding: 20px;
        }

        /* Title */
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            overflow: hidden;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* Image */
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        /* Hover Effects */
        .card:hover {
            transform: scale(1.07);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card:hover img {
            transform: scale(1.2);
            filter: brightness(70%);
        }

        /* Overlay Text */
        .card::after {
            content: "Delicious Food";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .card:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>

<body>

    <h1>🍽️ Food Image Gallery 🍽️</h1>

    <div class="gallery">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38" alt="Pizza">
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe" alt="Salad">
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="Indian Food">
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1525755662778-989d0524087e" alt="Pasta">
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1499028344343-cd173ffc68a9" alt="Fries">
        </div>
    </div>

</body>
</html>
